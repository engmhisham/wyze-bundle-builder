<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Shield with cloud icon -->
  <g transform="translate(100, 100)">
    <!-- Shield outline -->
    <path d="M 0,-40 L 35,-20 L 35,10 Q 0,45 0,45 Q 0,45 -35,10 L -35,-20 Z"
          fill="#3b82f6" stroke="#1e3a8a" stroke-width="1.5"/>

    <!-- Cloud inside shield -->
    <g transform="translate(0, 0)">
      <!-- Cloud shape -->
      <path d="M -18,-5 Q -22,-15 -12,-18 Q -8,-22 0,-20 Q 8,-22 12,-18 Q 22,-15 18,-5 Q 20,2 15,8 L -15,8 Q -20,2 -18,-5 Z"
            fill="#ffffff" opacity="0.9"/>
    </g>

    <!-- Infinity symbol inside cloud -->
    <path d="M -8,0 Q -4,-4 0,0 Q 4,-4 8,0 Q 4,4 0,0 Q -4,4 -8,0"
          stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.8"/>
  </g>
</svg>